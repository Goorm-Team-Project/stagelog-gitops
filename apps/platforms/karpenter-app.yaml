apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: karpenter
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/Goorm-Team-Project/stagelog-gitops.git'
    targetRevision: develop
    path: charts/karpenter
    helm:
      valueFiles:
        - values/dev/karpenter.yaml
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: karpenter
  syncPolicy:
    automated:
      prune: true
      selfHeal: true