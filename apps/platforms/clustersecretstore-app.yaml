apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: secretstore
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-1" 
  finalizers:
    - resources-finalizer.argocd.argoproj.io

spec:
  project: dev-stagelog
  
  source:
    repoURL: https://github.com/Goorm-Team-Project/stagelog-gitops.git
    targetRevision: develop
    path: charts/clustersecretstore

    helm:
      valueFiles:
        - values/dev/clustersecretstore.yaml

  destination:
    server: https://kubernetes.default.svc
    namespace: default

  syncPolicy:
    automated:
      prune: true
      selfHeal: true

    