apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argo-rollouts-crd
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-2"   # ⭐ 무조건 먼저
spec:
  project: dev-stagelog

  source:
    repoURL: https://github.com/argoproj/argo-rollouts
    targetRevision: v1.7.2
    path: manifests/crds

  destination:
    server: https://kubernetes.default.svc
    namespace: argo-rollouts

  ignoreDifferences:
  - group: apiextensions.k8s.io
    kind: CustomResourceDefinition
    jsonPointers:
      - /status
      - /spec/conversion
      - /spec/preserveUnknownFields
      
  syncPolicy:
    automated:
      prune: true
      selfHeal: true