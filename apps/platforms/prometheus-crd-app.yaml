apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: prometheus-operator-crd
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-2" # prometheus-stack(-1)보다 먼저
spec:
  project: dev-stagelog

  source:
    repoURL: https://github.com/prometheus-operator/prometheus-operator
    targetRevision: v0.89.0
    path: example/prometheus-operator-crd

  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring

  ignoreDifferences:
    - group: apiextensions.k8s.io
      kind: CustomResourceDefinition
      jsonPointers:
        - /status
        - /spec/conversion
        - /spec/preserveUnknownFields

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
