loki:
  deploymentMode: SingleBinary

  loki:
    auth_enabled: false

    commonConfig:
      replication_factor: 1
      path_prefix: /var/loki

    storage:
      type: filesystem

    schemaConfig:
      configs:
        - from: "2024-01-01"
          store: tsdb
          object_store: filesystem
          schema: v13
          index:
            prefix: index_
            period: 24h

    limits_config:
      retention_period: 72h
      max_query_series: 500
      max_query_parallelism: 2

  singleBinary:
    replicas: 1
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi
    persistence:
      enabled: false

  read:
    replicas: 0
  write:
    replicas: 0
  backend:
    replicas: 0

  gateway:
    enabled: false

  lokiCanary:
    enabled: false

  chunksCache:
    enabled: false
  resultsCache:
    enabled: false

  monitoring:
    selfMonitoring:
      enabled: false
      grafanaAgent:
        installOperator: false
    serviceMonitor:
      enabled: true
      labels:
        release: prometheus-stack

  sidecar:
    rules:
      enabled: false

  test:
    enabled: false