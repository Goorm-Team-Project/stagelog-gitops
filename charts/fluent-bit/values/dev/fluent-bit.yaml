fluent-bit:
  rbac:
    create: true

  serviceAccount:
    create: true

  service:
    type: ClusterIP
    port: 2020

  config:
    service: |
      [SERVICE]
          Daemon        Off
          Flush         1
          Log_Level     info
          Parsers_File  /fluent-bit/etc/parsers.conf
          Parsers_File  /fluent-bit/etc/conf/custom_parsers.conf
          HTTP_Server   On
          HTTP_Listen   0.0.0.0
          HTTP_Port     2020
          Health_Check  On

    inputs: |
      [INPUT]
          Name              tail
          Path              /var/log/containers/*.log
          multiline.parser  docker, cri
          Tag               kube.*
          Mem_Buf_Limit     10MB
          Skip_Long_Lines   On
          Refresh_Interval  10

    filters: |
      [FILTER]
          Name                kubernetes
          Match               kube.*
          Merge_Log           On
          Keep_Log            Off
          K8S-Logging.Parser  On
          K8S-Logging.Exclude On

      [FILTER]
          Name                grep
          Match               kube.*
          Exclude             $kubernetes['namespace_name'] kube-system

    outputs: |
      [OUTPUT]
          Name                   loki
          Match                  kube.*
          Host                   loki.monitoring.svc.cluster.local
          Port                   3100
          auto_kubernetes_labels off
          labels                 job=fluent-bit
          label_keys             $kubernetes['namespace_name'],$kubernetes['container_name']