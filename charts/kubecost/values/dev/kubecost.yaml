cost-analyzer:
  nodeSelector:
    eks.amazonaws.com/capacityType: ON_DEMAND

  persistentVolume:
    enabled: false

  kubecostModel:
    persistence:
      enabled: false

  prometheus:
    server:
      persistentVolume:
        enabled: false

  resources:
    requests:
      cpu: "200m"
      memory: "256Mi"
    limits:
      cpu: "800m"
      memory: "1Gi"