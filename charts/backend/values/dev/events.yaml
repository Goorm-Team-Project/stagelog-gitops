name: dev-events

deployment:
  enabled: true

replicaCount: 1

image:
  repository: 430118823715.dkr.ecr.ap-northeast-2.amazonaws.com/stagelog-events
  tag: latest
  pullPolicy: Always

service:
  enabled: true
  name: events-svc
  type: ClusterIP
  port: 8000

ingress:
  enabled: false

secret:
  enabled: false

serviceAccount:
  enabled: false

envFromSecret: dev-events-secret

env:
  - name: DJANGO_SETTINGS_MODULE
    value: config.settings
  