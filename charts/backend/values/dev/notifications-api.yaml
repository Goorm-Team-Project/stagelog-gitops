name: dev-notifications-api

rollout:
  enabled: true
  activeService: notifications-svc
  previewService: notifications-svc-preview

deployment:
  enabled: false

replicaCount: 1

hpa:
  enabled: true
  kind: Rollout
  minReplicas: 1
  maxReplicas: 5

nodeSelector:
  karpenter.sh/capacity-type: spot

image:
  repository: 430118823715.dkr.ecr.ap-northeast-2.amazonaws.com/stagelog-notifications
  tag: 31a5faf95624
  pullPolicy: Always

service:
  enabled: true
  name: notifications-svc
  type: ClusterIP
  port: 8000

ingress:
  enabled: false

secret:
  enabled: false

serviceAccount:
  enabled: true
  create: true
  name: stagelog-notifications-api-sa
  roleArn: arn:aws:iam::430118823715:role/stagelog-notifications-api-workload-role

envFromSecret: dev-notifications-secret

env:
  - name: DJANGO_SETTINGS_MODULE
    value: config.settings

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 400m
    memory: 512Mi

readinessProbe:
  enabled: true
  path: /
  port: 8000
  initialDelaySeconds: 10
  periodSeconds: 5
  timeoutSeconds: 2
  failureThreshold: 3

livenessProbe:
  enabled: true
  path: /
  port: 8000
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 2
  failureThreshold: 3