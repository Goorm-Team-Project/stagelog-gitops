name: dev-posts

rollout:
  enabled: true
  activeService: posts-svc
  previewService: posts-svc-preview

deployment:
  enabled: false

replicaCount: 1

image:
  repository: 430118823715.dkr.ecr.ap-northeast-2.amazonaws.com/stagelog-posts
  tag: 817be585d5c5
  pullPolicy: Always

service:
  enabled: true
  name: posts-svc
  type: ClusterIP
  port: 8000

ingress:
  enabled: false

secret:
  enabled: false

serviceAccount:
  enabled: true
  create: true
  name: stagelog-posts-sa
  roleArn: arn:aws:iam::430118823715:role/stagelog-posts-workload-role

envFromSecret: dev-posts-secret

env:
  - name: DJANGO_SETTINGS_MODULE
    value: config.settings

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 400m
    memory: 512Mi

readinessProbe:
  enabled: true
  path: /
  port: 8000
  initialDelaySeconds: 10
  periodSeconds: 5
  timeoutSeconds: 2
  failureThreshold: 3

livenessProbe:
  enabled: true
  path: /
  port: 8000
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 2
  failureThreshold: 3