name: dev-posts

deployment:
  enabled: true

replicaCount: 1

image:
  repository: 430118823715.dkr.ecr.ap-northeast-2.amazonaws.com/stagelog-backend
  tag: latest
  pullPolicy: Always

service:
  enabled: true
  name: posts-svc
  type: ClusterIP
  port: 8000

ingress:
  enabled: false

secret:
  enabled: false

serviceAccount:
  enabled: true
  create: false
  name: stagelog-posts-sa
  roleArn: arn:aws:iam::430118823715:role/stagelog-backend-workload-role

envFromSecret: stagelog-posts-env

env:
  - name: DJANGO_SETTINGS_MODULE
    value: config.settings