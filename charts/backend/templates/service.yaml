{{- if .Values.service.enabled }}
apiVersion: v1
kind: Service

metadata:
  name: {{ .Values.service.name }}
  labels:
    app: {{ .Values.name }}

spec:
  type: {{ .Values.service.type }}

  selector:
    app: {{ .Values.name }}

  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.port }}
      protocol: TCP

{{- end }}