apiVersion: v1
kind: Service

metadata:
  name: {{  include "backend.fullname" . }}
  labels:
    app: {{ .Values.name }}

spec:
  type: {{ .Values.service.type }}

  selector:
    app: {{ .Values.name }}

  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.port }}
      protocol: TCP