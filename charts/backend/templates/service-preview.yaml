{{- if (.Values.rollout.enabled | default false) }}
apiVersion: v1
kind: Service

metadata:
  name: {{ .Values.rollout.previewService }}
  labels:
    app: {{ .Values.name }}

spec:
  type: {{ .Values.service.type }}

  selector:
    app: {{ .Values.name }}

  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.port }}
      protocol: TCP

{{- end }}