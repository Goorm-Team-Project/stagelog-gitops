apiVersion: karpenter.k8s.aws/v1
kind: EC2NodeClass
metadata:
  name: default
spec:
  amiFamily: AL2 # Amazon Linux 2
  role: {{ .Values.nodeRole }}

  amiSelectorTerms:
    - tags:
        karpenter.sh/discovery: "amazon-eks-node-1.34-*"
  subnetSelectorTerms:
  - tags:
      karpenter.sh/discovery: {{ .Values.clusterName }}

  securityGroupSelectorTerms:
  - tags:
      karpenter.sh/discovery: {{ .Values.clusterName }}

  tags:
    Name: "stagelog-karpenter-node"
    intent: "apps"
    managed-by: "karpenter"