kube-prometheus-stack:
  _onDemandNodeSelector: &onDemandNodeSelector
    eks.amazonaws.com/capacityType: ON_DEMAND

  crds:
    enabled: false
    upgradeJob:
      enabled: false

  # kube-system 네임스페이스에 Service/ServiceMonitor 등을 생성하는 컴포넌트 비활성화
  kubeApiServer:
    enabled: false
  kubeControllerManager:
    enabled: false
  kubeScheduler:
    enabled: false
  kubeEtcd:
    enabled: false
  kubeProxy:
    enabled: false
  coreDns:
    enabled: false

  grafana:
    nodeSelector: *onDemandNodeSelector
    adminPassword: "admin"
    dashboards:
      default:
        node-exporter:
          gnetId: 1860
          revision: 31
          datasource: "Prometheus"
        k8s-compute-resources:
          gnetId: 315
          revision: 3
          datasource: "Prometheus"
    persistence:
      enabled: false
    # Loki
    additionalDataSources:
      - name: Loki
        type: loki
        access: proxy
        url: http://loki.monitoring.svc.cluster.local:3100
        isDefault: false
        jsonData:
          maxLines: 1000

  prometheus:
    prometheusSpec:
      nodeSelector: *onDemandNodeSelector
      scrapeInterval: "30s"
      scrapeTimeout: "10s"
      retention: "15d"
      serviceMonitorSelectorNilUsesHelmValues: false
      serviceMonitorSelector:
        matchLabels:
          release: "prometheus-stack"

  alertmanager:
    enabled: true
    config:
      global:
        resolve_timeout: 5m
      route:
        group_by: ['alertname', 'job']
        receiver: 'discord'
        group_wait: 10s
        group_interval: 10s
        repeat_interval: 12h
      receivers:
      - name: 'null'
        # chart 기본값과의 호환용 (undefined receiver "null" 방지)
      - name: 'discord'
        discord_configs:
        - webhook_url_file: /etc/alertmanager/discord-webhook/webhook-url
          send_resolved: true
    alertmanagerSpec:
      nodeSelector: *onDemandNodeSelector
      volumes:
        - name: discord-webhook
          secret:
            secretName: prometheus-discord-webhook
      volumeMounts:
        - name: discord-webhook
          mountPath: /etc/alertmanager/discord-webhook
          readOnly: true

  prometheusOperator:
    nodeSelector: *onDemandNodeSelector
    admissionWebhooks:
      enabled: true

  prometheus-node-exporter:
    prometheus:
      monitor:
        enabled: true

  kube-state-metrics:
    nodeSelector: *onDemandNodeSelector

# ExternalSecret
discordWebhookExternalSecret:
  enabled: true
  name: prometheus-discord-webhook
  namespace: monitoring
  secretStoreRef:
    name: aws-parameterstore
    kind: ClusterSecretStore
  refreshInterval: 1h
  target:
    name: prometheus-discord-webhook
    creationPolicy: Owner
  data:
    - secretKey: webhook-url
      remoteRef:
        key: /stagelog/monitoring/discord-webhook-url
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None

# PrometheusRule
customPrometheusRule:
  enabled: true
  name: custom-alerts
  namespace: monitoring
  labels:
    release: prometheus-stack
  groups:
    - name: custom.rules
      rules:
        - alert: ResourceBurnerCpuHigh
          expr: rate(container_cpu_usage_seconds_total{namespace="monitoring",pod="resource-burner",container="stress"}[1m]) > 0.08
          for: 1m
          labels:
            severity: warning
          annotations:
            summary: "resource-burner CPU near limit"
            description: "resource-burner CPU usage is near 100m limit"
        - alert: ResourceBurnerMemoryHigh
          expr: container_memory_working_set_bytes{namespace="monitoring",pod="resource-burner",container="stress"} > 45 * 1024 * 1024
          for: 1m
          labels:
            severity: warning
          annotations:
            summary: "resource-burner memory high"
            description: "resource-burner memory working set > 45Mi"