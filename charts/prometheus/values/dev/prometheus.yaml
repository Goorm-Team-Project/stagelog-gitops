kube-prometheus-stack:
  grafana:
    adminPassword: "admin"
    dashboards:
      default:
        node-exporter:
          gnetId: 1860
          revision: 31
          datasource: "Prometheus"
        k8s-compute-resources:
          gnetId: 315
          revision: 3
          datasource: "Prometheus"
    persistence:
      enabled: true
      storageClassName: "gp3" # EKS 동적 프로비저닝 (EBS)
      size: 5Gi
    additionalDataSources: # Loki 데이터 소스 추가
      - name: Loki
        uid: loki
        type: loki
        access: proxy
        isDefault: true
        editable: false
        url: http://loki-gateway.monitoring.svc.cluster.local # Loki 데이터 소스 URL (gateway/direct service 이름)
        jsonData:
          maxLines: 1000

  prometheus:
    prometheusSpec:
      scrapeInterval: "30s" # Grafana Timeout 충돌 해결을 위한 간격 상향
      scrapeTimeout: "10s"
      retention: "15d"
      storageSpec:
        volumeClaimTemplate:
          spec:
            storageClassName: "gp3"
            accessModes: ["ReadWriteOnce"]
            resources:
              requests:
                storage: 20Gi
      serviceMonitorSelectorNilUsesHelmValues: false
      serviceMonitorSelector:
        matchLabels:
          release: "prometheus-stack"

  alertmanager:
    enabled: true
    config:
      global:
        resolve_timeout: 5m
      route:
        group_by: ['alertname']
        receiver: 'discord'
      receivers:
      - name: 'discord'
        discord_configs:
        - webhook_url: 'https://discord.com/api/webhooks/1478914160292266166/RICxr28vSbD0NQ02dQIo8DJySAQRXQZd7XweBacdLwepsNz5D0nvE-WtG18tkmWe0Rex'
          send_resolved: true
    alertmanagerSpec:
      storage:
        volumeClaimTemplate:
          spec:
            storageClassName: "gp3"
            accessModes: ["ReadWriteOnce"]
            resources:
              requests:
                storage: 10Gi

  prometheus-node-exporter:
    prometheus:
      monitor:
        enabled: true