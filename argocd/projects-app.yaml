apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: projects-app
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://github.com/Goorm-Team-Project/stagelog-gitops.git
    targetRevision: develop
    path: projects/dev

  destination:
    server: https://kubernetes.default.svc
    namespace: argocd

  syncPolicy:
    automated:
      prune: true
      selfHeal: true